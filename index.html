<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="signup-left">
        <div class="odin-header">
            <img src="odin-lined.png" alt="odin-logo" width="50px" height="50px">
            <h1 class="odin-title">ODIN</h1>
        </div>
        <div class="credits">
            <p>Photo by <a href="https://unsplash.com/@maverickframe?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Maverick Frame</a> on <a href="https://unsplash.com/photos/illuminated-a-frame-cabins-with-solar-panels-in-snowy-forest-O4Z4p_nMvQI?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
        </div>

      </p>
    </div>
    <div class="signup-right">
        <div class="signup-header">
            <h2>This is not a real online service! you know you need something like this in your 
                life to help you realize your deepest dreams. 
                Sign up now to get started. 
            </h2>
            <br>
            <h2>You know you want to.</h2>
        </div>
        <div class="signup-form">
            
            <form action="#" method="post" id="form1">
                <div class="form_title">
                     <h1>Lets do this!</h1>
                </div>
                <div class="form_inputs">
                    <p>
                        <label for="first_name">first name</label>
                        <input type="text" id="first_name" required>
                        
                        <label for="email">email</label>
                        <input type="email" id="email" placeholder="example@email.com" required>
                     
                     
                        <label for="password">password</label>
                        <input type="password" id="password" minlength="6" required>
                    </p>

                    <p>
                        <label for="last_name">last name</label>
                        <input type="text" id="last_name" required>

                        <label for="tel">phone number</label>
                        <input type="tel" id="tel" required>
                    
                        <label for="confirm_password">confirm password</label>
                        <input type="password" id="confirm_password"  minlength="6" required>
                    </p>

                </div>
                    
            </form>
        </div>
        <div class="signup-footer">
            <button type="submit" form="form1">Create Account</button>
            <p>Already have an account? <a href="#login">Log in</a></p>
        </div>
    </div>
</body>
</html>
